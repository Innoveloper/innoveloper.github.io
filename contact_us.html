<body>
<div class="container">
    <!-- Navigation Component -->
    <div id="navigation"></div>

    <!-- Main Content Grid -->
    <main class="page-grid">

        <!-- Left Side: Hero + Contact Cards -->
        <div style="grid-column: span 5; display: flex; flex-direction: column; gap: 24px;">
            <!-- Hero Card -->
            <div class="card contact-hero-card" style="background: radial-gradient(circle at top right, #0e1c3a 0%, transparent 70%);">
                <div class="badge">Accepting New Projects</div>
                <h1 class="contact-hero-title">Let's Build The Future.</h1>
                <p class="hero-desc">Ready to transform your vision into reality? Reach out to our team of innovators and let's craft something extraordinary.</p>
            </div>

            <!-- Online Now Card -->
            <div class="card contact-online-card" style="padding: 30px;">
                <div class="info-header">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div class="avatars">
                            <div class="avatar"><img src="https://i.pravatar.cc/100?u=team1" style="width:100%"></div>
                            <div class="avatar"><img src="https://i.pravatar.cc/100?u=team2" style="width:100%"></div>
                            <div class="avatar"><img src="https://i.pravatar.cc/100?u=team3" style="width:100%"></div>
                        </div>
                        <div>
                            <p style="font-weight: 700; font-size: 0.95rem;">Online Now</p>
                            <p style="color: var(--text-dim); font-size: 0.75rem;">Avg. response < 2 mins</p>
                        </div>
                    </div>
                    <div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; cursor: pointer;">
                        <img src="https://img.icons8.com/ios-glyphs/30/ffffff/message-group.png" style="width:20px; filter: drop-shadow(0 2px 8px rgba(59, 130, 246, 0.3));"/>
                    </div>
                </div>
            </div>

            <!-- Email & Call Grid -->
            <div class="sub-info-grid contact-info-cards">
                <div class="card contact-email-card" style="padding: 30px;">
                    <img src="https://img.icons8.com/ios-filled/50/ffffff/mail.png" style="width:24px; margin-bottom: 20px; opacity: 0.8; filter: drop-shadow(0 2px 8px rgba(59, 130, 246, 0.3));"/>
                    <p style="color: var(--text-dim); font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 5px;">EMAIL US</p>
                    <p style="font-weight: 700; font-size: 0.9rem;">contact@innoveloper.com</p>
                </div>
                <div class="card contact-phone-card" style="padding: 30px;">
                    <img src="https://img.icons8.com/ios-filled/50/ffffff/phone.png" style="width:24px; margin-bottom: 20px; opacity: 0.8; filter: drop-shadow(0 2px 8px rgba(59, 130, 246, 0.3));"/>
                    <p style="color: var(--text-dim); font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 5px;">CALL US</p>
                    <p style="font-weight: 700; font-size: 0.9rem;">+91 9510564953</p>
                </div>
            </div>
        </div>

        <!-- Right Side: Form Only -->
        <div style="grid-column: span 7; display: flex; flex-direction: column; gap: 24px;" class="contact-form-section">
            <!-- Form Card -->
            <div class="card">
                <form class="contact-form" id="contact-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Your Name</label>
                            <input type="text" class="form-input" id="name" name="name" placeholder="John Doe" required>
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" class="form-input" id="email" name="email" placeholder="john@company.com" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Project Type</label>
                            <select class="form-select" id="projectType" name="projectType" required>
                                <option value="Application Development">Application Development</option>
                                <option value="Website Development">Website Development</option>
                                <option value="API Development">API Development</option>
                                <option value="Cloud Infrastructure">Cloud Infrastructure</option>
                                <option value="Database Design">Database Design</option>
                                <option value="Graphic Designing">Graphic Designing</option>
                                <option value="UI/UX Designing">UI/UX Designing</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Budget Range</label>
                            <select class="form-select" id="budget" name="budget" required>
                                <option value="$200 - $1,000">$200 - $1,000</option>
                                <option value="$1,000 - $2,500">$1,000 - $2,500</option>
                                <option value="$2,500 - $5,000">$2,500 - $5,000</option>
                                <option value="$5,000 - $7,500">$5,000 - $7,500</option>
                                <option value="$7,500 - $10,000">$7,500 - $10,000</option>
                                <option value="$10,000+">$10,000+</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Tell us about your project</label>
                        <textarea class="form-textarea" id="message" name="message" rows="6" placeholder="We are looking to build..." required></textarea>
                    </div>
                    <button type="submit" class="btn-send" id="submit-btn">Send Message <span>→</span></button>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer Component -->
    <div id="footer"></div>
</div>

<script src="components.js"></script>
<script src="common.js"></script>
<script>
  // Initialize page with components
  document.addEventListener('DOMContentLoaded', function() {
    // Navigation centered (no CTA button)
    document.getElementById('navigation').innerHTML = createNavigation({
      activeLink: 'contact_us.html',
      showCTA: false,
      centered: true
    });
    
    // Initialize mobile menu after navigation is created
    initMobileMenu();

    // Footer with social links and legal links
    document.getElementById('footer').innerHTML = createFooter({
      socialLinks: [
        { href: 'https://www.linkedin.com/company/innoveloper', name: 'LinkedIn', label: 'LinkedIn' },
        { href: 'https://www.instagram.com/innoveloper/', name: 'Instagram', label: 'Instagram' },
        { href: 'https://www.youtube.com/@Innoveloper', name: 'YouTube', label: 'YouTube' }
      ],
      legalLinks: [
        { href: 'privacy_policy.html', text: 'Privacy Policy' },
        { href: 'terms_of_service.html', text: 'Terms of Service' }
      ]
    });

    // Contact form submission handler
    const contactForm = document.getElementById('contact-form');
    const submitBtn = document.getElementById('submit-btn');
    
    if (contactForm) {
      contactForm.addEventListener('submit', async function(e) {
        e.preventDefault();
        
        // Get form values
        const name = document.getElementById('name').value.trim();
        const email = document.getElementById('email').value.trim();
        const projectType = document.getElementById('projectType').value;
        const budget = document.getElementById('budget').value;
        const message = document.getElementById('message').value.trim();
        
        // Validate form
        if (!name || !email || !message) {
          showToast('Please fill in all required fields', 'error');
          return;
        }
        
        // Validate email format
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!emailRegex.test(email)) {
          showToast('Please enter a valid email address', 'error');
          return;
        }
        
        // Disable submit button and show loading state
        submitBtn.disabled = true;
        const originalText = submitBtn.innerHTML;
        submitBtn.innerHTML = 'Sending... <span>⏳</span>';
        
        try {
          // Create FormData object
          const formData = new FormData();
          formData.append('name', name);
          formData.append('email', email);
          formData.append('projectType', projectType);
          formData.append('budget', budget);
          formData.append('message', message);
          
          // Make API request
          const response = await fetch('https://mail.jdbarad.duckdns.org/api/contact', {
            method: 'POST',
            body: formData
          });
          
          // Check if response is ok
          if (!response.ok) {
            throw new Error(`HTTP error! status: ${response.status}`);
          }
          
          const data = await response.json().catch(() => {
            // If response is not JSON, return success message
            return { success: true, message: 'Message sent successfully!' };
          });
          
          // Show success message
          showToast(data.message || 'Message sent successfully! We\'ll get back to you soon.', 'success');
          
          // Reset form
          contactForm.reset();
          
        } catch (error) {
          console.error('Error submitting form:', error);
          showToast('Failed to send message. Please try again or contact us directly.', 'error');
        } finally {
          // Re-enable submit button
          submitBtn.disabled = false;
          submitBtn.innerHTML = originalText;
        }
      });
    }
  });

  // Toast notification function
  function showToast(message, type = 'success') {
    // Remove existing toast if any
    const existingToast = document.getElementById('toast-notification');
    if (existingToast) {
      existingToast.remove();
    }

    // Create toast element
    const toast = document.createElement('div');
    toast.id = 'toast-notification';
    toast.className = `toast toast-${type}`;
    toast.textContent = message;
    
    // Add toast styles if not already in CSS
    toast.style.cssText = `
      position: fixed;
      bottom: 30px;
      right: 30px;
      background: ${type === 'success' ? '#10b981' : '#ef4444'};
      color: white;
      padding: 16px 24px;
      border-radius: 12px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
      z-index: 10000;
      font-size: 0.9rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(20px);
      transition: all 0.3s ease;
      max-width: 400px;
    `;
    
    // Add toast to body
    document.body.appendChild(toast);
    
    // Show toast with animation
    setTimeout(() => {
      toast.style.opacity = '1';
      toast.style.transform = 'translateY(0)';
    }, 10);
    
    // Hide and remove toast after 4 seconds
    setTimeout(() => {
      toast.style.opacity = '0';
      toast.style.transform = 'translateY(20px)';
      setTimeout(() => {
        toast.remove();
      }, 300);
    }, 4000);
  }
</script>
</body>
</html>
