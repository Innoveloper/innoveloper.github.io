<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="/favicon/favicon-96x96.png" sizes="96x96" />
    <link rel="icon" type="image/svg+xml" href="/favicon/favicon.svg" />
    <link rel="shortcut icon" href="/favicon/favicon.ico" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon/apple-touch-icon.png" />
    <meta name="apple-mobile-web-app-title" content="Innoveloper" />
    <link rel="manifest" href="/favicon/site.webmanifest" />
    <title>Contact Us | Innoveloper</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
<div class="container">
    <!-- Navigation Component -->
    <div id="navigation"></div>

    <!-- Main Content Grid -->
    <main class="page-grid">

        <!-- Left Side: Hero + Contact Cards -->
        <div style="grid-column: span 5; display: flex; flex-direction: column; gap: 24px;">
            <!-- Hero Card -->
            <div class="card contact-hero-card" style="background: radial-gradient(circle at top right, #0e1c3a 0%, transparent 70%);">
                <div class="badge">Accepting New Projects</div>
                <h1 class="contact-hero-title">Let's Build The Future.</h1>
                <p class="hero-desc">Ready to transform your vision into reality? Reach out to our team of innovators and let's craft something extraordinary.</p>
            </div>

            <!-- Online Now Card -->
            <div class="card contact-online-card" style="padding: 30px;">
                <div class="info-header">
                    <div style="display: flex; align-items: center; gap: 15px;">
                        <div class="avatars">
                            <div class="avatar"><img src="https://i.pravatar.cc/100?u=team1" style="width:100%"></div>
                            <div class="avatar"><img src="https://i.pravatar.cc/100?u=team2" style="width:100%"></div>
                            <div class="avatar"><img src="https://i.pravatar.cc/100?u=team3" style="width:100%"></div>
                        </div>
                        <div>
                            <p style="font-weight: 700; font-size: 0.95rem;">Online Now</p>
                            <p style="color: var(--text-dim); font-size: 0.75rem;">Avg. response < 2 mins</p>
                        </div>
                    </div>
                    <div style="background: rgba(255,255,255,0.05); padding: 10px; border-radius: 12px; cursor: pointer;">
                        <img src="https://img.icons8.com/ios-glyphs/30/ffffff/message-group.png" style="width:20px; filter: drop-shadow(0 2px 8px rgba(59, 130, 246, 0.3));"/>
                    </div>
                </div>
            </div>

            <!-- Email & Call Grid -->
            <div class="sub-info-grid contact-info-cards">
                <div class="card contact-email-card" style="padding: 30px;">
                    <img src="https://img.icons8.com/ios-filled/50/ffffff/mail.png" style="width:24px; margin-bottom: 20px; opacity: 0.8; filter: drop-shadow(0 2px 8px rgba(59, 130, 246, 0.3));"/>
                    <p style="color: var(--text-dim); font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 5px;">EMAIL US</p>
                    <p style="font-weight: 700; font-size: 0.9rem;">contact@innoveloper.com</p>
                </div>
                <div class="card contact-phone-card" style="padding: 30px;">
                    <img src="https://img.icons8.com/ios-filled/50/ffffff/phone.png" style="width:24px; margin-bottom: 20px; opacity: 0.8; filter: drop-shadow(0 2px 8px rgba(59, 130, 246, 0.3));"/>
                    <p style="color: var(--text-dim); font-size: 0.7rem; letter-spacing: 1px; margin-bottom: 5px;">CALL US</p>
                    <p style="font-weight: 700; font-size: 0.9rem;">+91 9510564953</p>
                </div>
            </div>
        </div>

        <!-- Right Side: Form Only -->
        <div style="grid-column: span 7; display: flex; flex-direction: column; gap: 24px;" class="contact-form-section">
            <!-- Form Card -->
            <div class="card">
                <form class="contact-form">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Your Name</label>
                            <input type="text" class="form-input" placeholder="John Doe">
                        </div>
                        <div class="form-group">
                            <label>Email Address</label>
                            <input type="email" class="form-input" placeholder="john@company.com">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Project Type</label>
                            <select class="form-select">
                                <option>Application Development</option>
                                <option>Website Development</option>
                                <option>API Development</option>
                                <option>Cloud Infrastructure</option>
                                <option>Database Design</option>
                                <option>Graphic Designing</option>
                                <option>UI/UX Designing</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Budget Range</label>
                            <select class="form-select">
                                <option>$200 - $1,000</option>
                                <option>$1,000 - $2,500</option>
                                <option>$2,500 - $5,000</option>
                                <option>$5,000 - $7,500</option>
                                <option>$7,500 - $10,000</option>
                                <option>$10,000+</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Tell us about your project</label>
                        <textarea class="form-textarea" rows="6" placeholder="We are looking to build..."></textarea>
                    </div>
                    <button type="submit" class="btn-send">Send Message <span>→</span></button>
                </form>
            </div>
        </div>
    </main>

    <!-- Footer Component -->
    <div id="footer"></div>
</div>

<script src="components.js"></script>
<script src="common.js"></script>
<script>
  // Initialize page with components
  document.addEventListener('DOMContentLoaded', function() {
    // Navigation centered (no CTA button)
    document.getElementById('navigation').innerHTML = createNavigation({
      activeLink: 'contact_us.html',
      showCTA: false,
      centered: true
    });
    
    // Initialize mobile menu after navigation is created
    initMobileMenu();

    // Footer with social links and legal links
    document.getElementById('footer').innerHTML = createFooter({
      socialLinks: [
        { href: 'https://www.linkedin.com/company/innoveloper', name: 'LinkedIn', label: 'LinkedIn' },
        { href: 'https://www.instagram.com/innoveloper/', name: 'Instagram', label: 'Instagram' },
        { href: 'https://www.youtube.com/@Innoveloper', name: 'YouTube', label: 'YouTube' }
      ],
      legalLinks: [
        { href: 'privacy_policy.html', text: 'Privacy Policy' },
        { href: 'terms_of_service.html', text: 'Terms of Service' }
      ]
    });
  });
</script>
</body>
</html>
